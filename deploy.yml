name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change to "master" if your default branch is master

# Required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload the whole repo root as the Pages artifact.
      # If your HTML file lives in a subfolder (e.g. /docs or /dist),
      # change `path: '.'` to `path: 'docs'` etc.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
